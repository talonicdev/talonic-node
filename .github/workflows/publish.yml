name: Publish @talonic/node

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'docs/**'
      - 'package.json'
  # Manual trigger as a safety valve. Reach for this when an automated
  # rerun is stuck in queue or when you need to re-fire the publish chain
  # without making a code change (e.g. after rotating a secret). From the
  # CLI: `gh workflow run publish.yml -r main`.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Need history so we can diff the pushed range and inspect commit
          # messages for the [skip docs] opt-out below.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Docs-drift guard.
      #
      # talonic.com/docs/sdk is fed by docs/sections.json (via the platform's
      # sync-external-docs workflow → @talonic/docs → the website). The file
      # is hand-maintained — it is NOT auto-generated from src/. That used to
      # mean SDK changes could ship to npm without the public docs pages
      # catching up, because the platform sync detects a no-op diff and
      # skips publishing @talonic/docs.
      #
      # Rule: if any "documentable" source path changed in this push but
      # docs/sections.json did not, fail loudly. Genuinely-non-doc-affecting
      # changes (refactors, internal-only fixes, CI) can opt out by including
      # `[skip docs]` anywhere in any commit message in the push.
      - name: Docs-drift guard
        run: |
          set -euo pipefail
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE="HEAD~1"
          fi
          RANGE="${BEFORE}..HEAD"
          echo "Inspecting range: $RANGE"

          CHANGED_FILES="$(git diff --name-only "$RANGE")"
          echo "Changed files:"
          echo "$CHANGED_FILES" | sed 's/^/  /'

          # Documentable paths — changes here typically need docs updates.
          DOCUMENTABLE_REGEX='^(src/resources/|src/client\.ts$|src/index\.ts$|src/types\.ts$|src/errors\.ts$)'

          if ! echo "$CHANGED_FILES" | grep -qE "$DOCUMENTABLE_REGEX"; then
            echo "No documentable source paths changed. Skipping check."
            exit 0
          fi

          if echo "$CHANGED_FILES" | grep -q '^docs/sections.json$'; then
            echo "docs/sections.json updated alongside source. OK."
            exit 0
          fi

          if git log --format=%B "$RANGE" | grep -qiF '[skip docs]'; then
            echo "Found [skip docs] opt-out in commit message. Skipping check."
            exit 0
          fi

          echo "::error::Documentable source paths changed but docs/sections.json was not updated."
          echo ""
          echo "talonic.com/docs/sdk is fed by docs/sections.json. Without an"
          echo "update there, the platform sync will detect no diff and"
          echo "@talonic/docs will not be republished — the public docs pages"
          echo "will silently drift behind the actual product."
          echo ""
          echo "Either update docs/sections.json with the corresponding content,"
          echo "or include [skip docs] in a commit message in this push if the"
          echo "change is genuinely not docs-affecting (refactors, internal-only"
          echo "fixes, etc.)."
          exit 1

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Auto-bump patch version
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          NPM_VERSION=$(npm view @talonic/node version 2>/dev/null || echo "0.0.0")
          if [ "$CURRENT" = "$NPM_VERSION" ]; then
            npm version patch --no-git-tag-version
            NEW=$(node -p "require('./package.json').version")
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            echo "version=$NEW" >> "$GITHUB_OUTPUT"
            echo "Auto-bumped ${CURRENT} → ${NEW}"
          else
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "Version ${CURRENT} not yet published — using as-is"
          fi

      - name: Commit version bump
        if: steps.version.outputs.bumped == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump @talonic/node to ${{ steps.version.outputs.version }} [skip ci]"
          git push

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # GitHub Release is what Glama and similar surfaces track for "Recent
      # Releases" — npm publishes alone are not enough. Fires whenever a
      # publish succeeds (no `bumped == 'true'` gate, which would silently
      # strand the Release on reruns of a failed publish). Pre-checks for
      # an existing tag so the step is idempotent on reruns; the
      # `continue-on-error: true` absorbs any other failure mode without
      # breaking the downstream website/platform rebuilds.
      - name: Create GitHub Release
        if: success()
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "Release v${VERSION} already exists. Skipping create."
            exit 0
          fi
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Trigger website rebuild
        if: success()
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.WEBSITE_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/talonicdev/website/dispatches \
            -d '{"event_type":"sdk-updated","client_payload":{"version":"${{ steps.version.outputs.version }}","package":"@talonic/node"}}'
        continue-on-error: true

      - name: Trigger platform docs sync
        if: success()
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.PLATFORM_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/talonicdev/platform/dispatches \
            -d '{"event_type":"external-docs-updated","client_payload":{"source":"node-sdk","version":"${{ steps.version.outputs.version }}"}}'
        continue-on-error: true
